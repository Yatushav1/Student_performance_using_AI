<!DOCTYPE html>
<html>

<head>
<title>Student Performance Predictor</title>
</head>

<body>

<h2>Student Performance Prediction</h2>

<form action="/predict" method="post">

<label>Weekly Study Hours</label><br>
<input type="text" name="study_hours"><br><br>

<label>Attendance Percentage</label><br>
<input type="text" name="attendance"><br><br>

<label>Class Participation</label><br>
<input type="text" name="participation"><br><br>

<label>Total Score</label><br>
<input type="text" name="score"><br><br>

<button type="submit">Predict Grade</button>

</form>

<h3>{{ result }}</h3>

</body>

</html>
